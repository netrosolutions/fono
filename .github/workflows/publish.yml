name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Opt into Node.js 24 for all action runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write        # push tags + create GitHub releases
      pull-requests: write   # open Changesets version PR
      id-token: write        # npm provenance attestation

    steps:
      - name: Checkout (full history for Changesets)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      # Changesets will either:
      #   a) Open / update a "Version Packages" PR (when .changeset files exist)
      #   b) Publish to npm (when merging that PR into main)
      - name: Publish or open version PR
        uses: changesets/action@v1
        with:
          publish: npm run release
          title: "chore: release packages"
          commit: "chore: release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}