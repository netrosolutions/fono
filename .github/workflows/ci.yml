name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

jobs:
  ci:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x, 23.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (fono)
        run: npm run typecheck --workspace=packages/fono

      - name: Build (fono)
        run: npm run build --workspace=packages/fono

      - name: Typecheck (create-fono)
        run: npm run typecheck --workspace=packages/create-fono

      - name: Build (create-fono)
        run: npm run build --workspace=packages/create-fono

  # Quick smoke test: run create-fono and verify the output builds
  scaffold-test:
    name: Scaffold smoke test
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install & build packages
        run: npm ci && npm run build

      - name: Run create-fono (minimal, node)
        run: |
          node packages/create-fono/dist/index.js test-app \
            --runtime node --template minimal --pkgManager npm \
            --no-install --no-git
        env:
          CI: true

      - name: Verify scaffold output exists
        run: |
          test -f test-app/server.ts
          test -f test-app/client.ts
          test -f test-app/app/layouts.tsx
          test -f test-app/app/routes/home.tsx
          echo "Scaffold files present ✓"
