name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-and-typecheck:
    name: Build & Typecheck (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install fnetro deps
        run: npm ci
        working-directory: packages/fnetro

      - name: Install create-fnetro deps
        run: npm ci
        working-directory: packages/create-fnetro

      - name: Typecheck fnetro
        run: npm run typecheck
        working-directory: packages/fnetro

      - name: Typecheck create-fnetro
        run: npm run typecheck
        working-directory: packages/create-fnetro

      - name: Build fnetro
        run: npm run build
        working-directory: packages/fnetro

      - name: Build create-fnetro
        run: npm run build
        working-directory: packages/create-fnetro

      - name: Verify dist outputs exist
        run: |
          test -f packages/fnetro/dist/core.js    || (echo "❌ dist/core.js missing"    && exit 1)
          test -f packages/fnetro/dist/server.js  || (echo "❌ dist/server.js missing"  && exit 1)
          test -f packages/fnetro/dist/client.js  || (echo "❌ dist/client.js missing"  && exit 1)
          test -f packages/fnetro/dist/core.d.ts  || (echo "❌ dist/core.d.ts missing"  && exit 1)
          test -f packages/fnetro/dist/server.d.ts|| (echo "❌ dist/server.d.ts missing"&& exit 1)
          test -f packages/fnetro/dist/client.d.ts|| (echo "❌ dist/client.d.ts missing"&& exit 1)
          test -f packages/create-fnetro/dist/index.js || (echo "❌ create-fnetro dist missing" && exit 1)
          echo "✅ All dist outputs present"

  # ────────────────────────────────────────────────────────────────────────────
  scaffold-test:
    name: Scaffold test (${{ matrix.template }} / ${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: build-and-typecheck

    strategy:
      fail-fast: false
      matrix:
        template: [minimal, full]
        runtime:  [node, bun]
        exclude:
          # Reduce matrix — test bun only with minimal template
          - template: full
            runtime:  bun

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: |
          npm ci
          npm ci --prefix packages/create-fnetro

      - name: Build create-fnetro
        run: npm run build
        working-directory: packages/create-fnetro

      - name: Scaffold project (CI mode)
        run: |
          node packages/create-fnetro/dist/index.js \
            test-scaffold-${{ matrix.template }}-${{ matrix.runtime }} \
            --ci \
            --template ${{ matrix.template }} \
            --runtime  ${{ matrix.runtime }} \
            --no-install \
            --no-git

      - name: Verify scaffolded files
        run: |
          DIR="test-scaffold-${{ matrix.template }}-${{ matrix.runtime }}"
          test -f "$DIR/app.ts"            || (echo "❌ app.ts missing"     && exit 1)
          test -f "$DIR/server.ts"         || (echo "❌ server.ts missing"  && exit 1)
          test -f "$DIR/client.ts"         || (echo "❌ client.ts missing"  && exit 1)
          test -f "$DIR/vite.config.ts"    || (echo "❌ vite.config.ts missing" && exit 1)
          test -f "$DIR/tsconfig.json"     || (echo "❌ tsconfig.json missing"  && exit 1)
          test -f "$DIR/app/layouts.tsx"   || (echo "❌ layouts.tsx missing" && exit 1)
          test -f "$DIR/app/routes/home.tsx" || (echo "❌ home.tsx missing" && exit 1)
          echo "✅ Scaffold files present"

  # ────────────────────────────────────────────────────────────────────────────
  lint-check:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Check for CRLF line endings
        run: |
          if grep -rlI $'\r' packages/fnetro/*.ts packages/create-fnetro/src/*.ts 2>/dev/null; then
            echo "❌ CRLF line endings found — use LF"
            exit 1
          fi
          echo "✅ Line endings OK"
